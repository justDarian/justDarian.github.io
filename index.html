<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

        scroll-behavior: smooth;

        display: flex;
        top: 50%;

        position: absolute;
        transform: translate(-50%, -50%);

    }

    canvas {
        position: fixed;
        z-index: -1;
    }
</style>

<script>
    var canvas = document.getElementById("canvas"),
        ctx = canvas.getContext('2d');

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    var stars = [],
        FPS = 60,
        x = 100,
        mouse = {
            x: 0,
            y: 0
        };

    for (var i = 0; i < x; i++) {
        stars.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            radius: Math.random() * 1 + 1,
            vx: Math.floor(Math.random() * 50) - 25,
            vy: Math.floor(Math.random() * 50) - 25
        });
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        ctx.globalCompositeOperation = "lighter";

        for (var i = 0, x = stars.length; i < x; i++) {
            var s = stars[i];

            ctx.fillStyle = "#fff";
            ctx.beginPath();
            ctx.arc(s.x, s.y, s.radius, 0, 2 * Math.PI);
            ctx.fill();
            ctx.fillStyle = 'black';
            ctx.stroke();
        }

        ctx.beginPath();
        for (var i = 0, x = stars.length; i < x; i++) {
            var starI = stars[i];
            ctx.moveTo(starI.x, starI.y);
            if (distance(mouse, starI) < 150) ctx.lineTo(mouse.x, mouse.y);
            for (var j = 0, x = stars.length; j < x; j++) {
                var starII = stars[j];
                if (distance(starI, starII) < 150) {
                    ctx.lineTo(starII.x, starII.y);
                }
            }
        }
        ctx.lineWidth = 0.05;
        ctx.strokeStyle = 'white';
        ctx.stroke();
    }

    function distance(point1, point2) {
        var xs = 0;
        var ys = 0;

        xs = point2.x - point1.x;
        xs = xs * xs;

        ys = point2.y - point1.y;
        ys = ys * ys;

        return Math.sqrt(xs + ys);
    }

    function update() {
        for (var i = 0, x = stars.length; i < x; i++) {
            var s = stars[i];

            s.x += s.vx / FPS;
            s.y += s.vy / FPS;

            if (s.x < 0 || s.x > canvas.width) s.vx = -s.vx;
            if (s.y < 0 || s.y > canvas.height) s.vy = -s.vy;
        }
    }

    canvas.addEventListener('mousemove', function(e) {
        mouse.x = e.clientX;
        mouse.y = e.clientY;
    });

    function tick() {
        draw();
        update();
        requestAnimationFrame(tick);
    }

    tick();
</script>

<script>

    const playlist = []; // originally had the song names added manually but
    // im lazy and renamed each song to a number and automated adding it to the playlist
    for (let i=0;i<9;i++) {
        playlist.push("bg/"+i.toString()+".mp3")
    }
    let currentSongIndex = 0;

    function play(overwriteIndex) {
        const audioPlayer = document.getElementById('audio'); // use a element instead of new Audio for more control over the songs being played
        audioPlayer.src = playlist[overwriteIndex ? overwriteIndex : currentSongIndex]; // play the next song or the chosen song
        audioPlayer.play();
        !overwriteIndex && (currentSongIndex = (currentSongIndex + 1) % playlist.length); // if the index is overwritten, dont modify it
        return true
    }

    document.getElementById('audio').addEventListener('ended', play);

    const overlay = document.createElement('div');
    overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background-color:#000;z-index:9999;color:#fff;display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer;font-family:"Comic Sans MS", cursive;transition: opacity 1s ease;';
    overlay.textContent = 'Click To Enter';

    overlay.onclick = function () {
        overlay.style.opacity = '0';
        setTimeout(async () => {
            document.body.removeChild(overlay);
        }, 1000);
        play(Math.floor(Math.random() * playlist.length)) // because of 0 indexing u cant add 1 (i learned this the hard way)
    };

    document.body.appendChild(overlay);

</script>
